// ─── APUFUNKTIOT─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}


// Finnish female name endings and common names for gender detection
const FEMALE_NAMES = ["anna","maria","sofia","emma","julia","laura","sara","emilia","aino","helmi",
  "elina","katja","liisa","hanna","erika","tuulia","siiri","veera","viola","aurora","isla","luna",
  "ida","ines","ilona","inkeri","iida","kaisa","kaarina","kristiina","leena","minna","niina","oona",
  "paula","petra","piia","riitta","riikka","sanna","sari","satu","suvi","tarja","tiina","tuija",
  "ulla","virpi","anne","jenni","johanna","maija","mervi","mirja","nina","pirjo","raija","terttu"];

const FEMALE_ENDINGS = ["a","ä","ia","iä","na","nä","la","lä","ra","rä","ta","tä","ina","inä"];

function guessFemale(name) {
  const n = name.trim().toLowerCase().split(" ")[0];
  if (FEMALE_NAMES.includes(n)) return true;
  // Heuristic: common Finnish female endings
  return FEMALE_ENDINGS.some(e => n.endsWith(e) && n.length > 3);
}

// Pick best voice: wantFemale = desired gender of the VOICE (opposite of player)
function pickVoice(voices, wantFemale) {
  const fi = voices.filter(v => v.lang && v.lang.startsWith("fi"));
  const pool = fi.length > 0 ? fi : voices;

  // Voice name keywords
  const femaleKeys = ["satu","anna","female","woman","girl","fiona","karen","samantha","amelie","monica"];
  const maleKeys   = ["mikko","male","man","guy","daniel","alex","jorge","diego","thomas","pierre"];

  const keys = wantFemale ? femaleKeys : maleKeys;
  const found = pool.find(v => keys.some(k => v.name.toLowerCase().includes(k)));
  if (found) return found;

  // Fallback: if multiple fi voices, alternate
  if (pool.length >= 2) return wantFemale ? pool[0] : pool[1];
  return pool[0] || null;
}

// Global: which player is currently active (set before speak calls)
let _currentPlayerName = "";

function setCurrentSpeaker(name) { _currentPlayerName = name; }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const doSpeak = () => {
    setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "fi-FI";

    const voices = window.speechSynthesis.getVoices();
    // Player is female → want male voice (partner), and vice versa
    const playerIsFemale = guessFemale(_currentPlayerName);
    const wantFemale = !playerIsFemale; // partner is opposite gender
    const voice = pickVoice(voices, wantFemale);
    if (voice) utt.voice = voice;

    // Miellyttävä ääni: rauhallinen tempo, luonnollinen pitch
    utt.rate  = 0.88;
    utt.pitch = wantFemale ? 1.15 : 0.92; // nainen hieman korkeampi, mies matalampi
    utt.volume = 1.0;

    window.speechSynthesis.speak(utt);
    }, 180);
  };
  if (window.speechSynthesis.getVoices().length > 0) doSpeak();
  else window.speechSynthesis.onvoiceschanged = doSpeak;
}

function buildDeck() {
  // Surprise cards: 2 copies each mixed in
  const surprises = SURPRISE_CARDS.map(s => ({...s, cardType:"surprise"}));
  return shuffle([...BASE_TRAITS, ...BASE_TRAITS, ...surprises, ...surprises]);
}

function buildFamilyDeck() {
  return shuffle([...FAMILY_CARDS, ...FAMILY_CARDS]);
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const getSaved = () => {
    try { const s = localStorage.getItem("treffi_names"); return s ? JSON.parse(s) : ["Pelaaja 1","Pelaaja 2","Pelaaja 3","Pelaaja 4"]; }
    catch { return ["Pelaaja 1","Pelaaja 2","Pelaaja 3","Pelaaja 4"]; }
  };

  const [screen, setScreen]               = useState("setup");
  const [playerCount, setPlayerCount]     = useState(2);
  const [playerNames, setPlayerNames]     = useState(getSaved);
  const [players, setPlayers]             = useState([]);
  const [partnerPrefs, setPartnerPrefs]   = useState(["","","",""]);
  const [currentPlayer, setCurrentPlayer] = useState(0);
  const [deck, setDeck]                   = useState([]);
  const [familyDeck, setFamilyDeck]       = useState([]);
  const [currentCard, setCurrentCard]     = useState(null);
  const [log, setLog]                     = useState([]);
  const [winner, setWinner]               = useState(null);
  const [decisionMade, setDecisionMade]   = useState(null);
  const [overlay, setOverlay]             = useState(null); // {type, ...}
  const [skipNext, setSkipNext]           = useState(false);
  const [chooseVictim, setChooseVictim]   = useState(false);
  const [pendingFamilyCard, setPendingFamilyCard] = useState(false);

  function goToSetup() {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setScreen("setup"); setPlayers([]); setDeck([]); setFamilyDeck([]);
    setCurrentCard(null); setLog([]); setWinner(null); setDecisionMade(null);
    setOverlay(null); setSkipNext(false); setChooseVictim(false); setPendingFamilyCard(false);
    setPartnerPrefs(["","","",""]);
  }

  function launchGame() {
    try { localStorage.setItem("treffi_names", JSON.stringify(playerNames)); } catch {}
    const newPlayers = Array.from({length: playerCount}, (_,i) => ({
      name: playerNames[i] || `Pelaaja ${i+1}`,
      level: 0, color: PLAYER_COLORS[i], skipped: false,
    }));
    setPlayers(newPlayers);
    setDeck(buildDeck());
    setFamilyDeck(buildFamilyDeck());
    setCurrentPlayer(0); setCurrentCard(null); setLog([]); setWinner(null);
    setDecisionMade(null); setOverlay(null); setSkipNext(false);
    setChooseVictim(false); setPendingFamilyCard(false);
    setScreen("preferences");
  }

  function startGame(pls) {
    const p = pls || players;
    setScreen("game");
    setTimeout(() => speak(`Peli alkaa! ${p[0].name}, sinun vuorosi. Olet tasolla ${LEVELS[0].name}.`), 300);
  }

  // Sukukortti laukeaa kun taso >= 4 (Ensimmäinen seksi -hetki läpäisty) tai pakolla
  function shouldDrawFamily(player, forced) {
    return forced || (player.level >= 4 && Math.random() < 0.3);
  }

  function drawCard() {
    if (currentCard) return;
    const cp = players[currentPlayer];

    // Sukukortti?
    if (shouldDrawFamily(cp, pendingFamilyCard)) {
      setPendingFamilyCard(false);
      let fd = familyDeck;
      if (fd.length < 3) fd = buildFamilyDeck();
      const [card, ...rest] = fd;
      setFamilyDeck(rest);
      setCurrentCard({...card, cardType:"family"});
      setCurrentSpeaker(players[currentPlayer]?.name || '');
      speak(`Sukukortti! Kumppanin ${card.role.replace('Kumppanin ','').replace('Perheen ','perheen ').replace('Suvun ','suvun ')}. ${card.text}`);
      setDecisionMade(null);
      return;
    }

    let d = deck;
    if (d.length < 5) d = buildDeck();
    const [card, ...rest] = d;
    setDeck(rest);
    setCurrentCard(card);
    setDecisionMade(null);

    if (card.cardType === "surprise") {
      setCurrentSpeaker(players[currentPlayer]?.name || '');
      speak(`Yllätyskäänne! ${card.text}`);
    } else {
      setCurrentSpeaker(players[currentPlayer]?.name || '');
    speak(card.text);
    }
  }

  function advanceTurn(updatedPlayers, nextIdx) {
    const p = updatedPlayers || players;
    const ni = nextIdx !== undefined ? nextIdx : (currentPlayer + 1) % playerCount;
    setCurrentCard(null); setDecisionMade(null); setChooseVictim(false);

    // Check skip
    if (p[ni] && p[ni].skipped) {
      const cleared = p.map((pl, i) => i === ni ? {...pl, skipped: false} : pl);
      setPlayers(cleared);
      speak(`${p[ni].name} menettää vuoronsa!`);
      const nextNext = (ni + 1) % playerCount;
      setTimeout(() => {
        setCurrentPlayer(nextNext);
        speak(`${cleared[nextNext].name}! Sinun vuorosi. Olet tasolla ${LEVELS[cleared[nextNext].level].name}.`);
      }, 1500);
    } else {
      setCurrentPlayer(ni);
      if (p[ni]) { setCurrentSpeaker(p[ni].name); speak(`${p[ni].name}! Sinun vuorosi. Olet tasolla ${LEVELS[p[ni].level].name}.`); }
    }
  }

  function checkWin(p) {
    return p.find(pl => pl.level >= LEVELS.length - 1);
  }

  function applyNormalDecision(accept, card, p, cpIdx) {
    const cp = {...p[cpIdx]};
    let msg = "";
    let doReset = false;
    let doAdvance = false;

    const isFamily = card.cardType === "family";

    if (accept) {
      // Dealbreaker: hyväksyminen nostaa tason (riskin ottaminen)
      if (cp.level < LEVELS.length - 1) {
        doAdvance = true;
        cp.level += 1;
        msg = `🎉 ${cp.name} → ${LEVELS[cp.level].name}!`;
      }
    } else {
      if (card.type === "dealbreaker") {
        msg = `👍 ${cp.name} hylkäsi dealbreakerin viisaasti!`;
      } else if (isFamily) {
        // Sukukortin hylkääminen: taso tippuu yhdellä
        if (cp.level > 0) {
          cp.level -= 1;
          msg = `👨‍👩‍👧 ${cp.name} hylkäsi suvun — taso tippuu yhden!`;
          speak(`${cp.name} hylkäsi suvun. Taso tippuu yhden.`);
        } else {
          msg = `👨‍👩‍👧 ${cp.name} hylkäsi suvun — ei voi tippua alemmas!`;
        }
        doReset = false;
      } else {
        doReset = true;
        msg = `💔 ${cp.name} hylkäsi — palataan alkuun!`;
        setCurrentSpeaker(cp.name); speak(`${cp.name} palaa alkuun!`);
      }
    }

    if (doReset) cp.level = 0;
    p[cpIdx] = cp;

    const w = checkWin(p);
    if (w) {
      setPlayers([...p]); setWinner(w);
      setDecisionMade(accept ? "accept" : "reject");
      setLog(prev => [msg, ...prev].slice(0,10));
      speak(`${w.name} voitti! Perhe on perustettu!`);
      setTimeout(() => setScreen("win"), 1800);
      return;
    }

    setPlayers([...p]);
    setDecisionMade(accept ? "accept" : "reject");
    setLog(prev => [msg, ...prev].slice(0,10));

    if (doAdvance) {
      setCurrentSpeaker(cp.name); speak(`${cp.name} etenee tasolle ${LEVELS[cp.level].name}!`);
      setOverlay({type:"levelup", playerName:cp.name, levelName:LEVELS[cp.level].name, emoji:LEVELS[cp.level].emoji});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2500);
    } else if (doReset) {
      setOverlay({type:"reset", playerName:cp.name});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2200);
    } else if (card.cardType === "family" && !accept && card.type !== "dealbreaker") {
      setOverlay({type:"familydown", playerName:cp.name, levelName:LEVELS[cp.level].name});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2200);
    } else {
      setTimeout(() => advanceTurn([...p]), 1200);
    }
  }

  function applySurprise(card, p, cpIdx) {
    const effect = card.effect;
    let msg = "";

    if (effect === "level_up_one") {
      const cp = {...p[cpIdx]};
      if (cp.level < LEVELS.length - 1) { cp.level += 1; }
      p[cpIdx] = cp;
      msg = `💌 ${cp.name} hyppää tasolle ${LEVELS[cp.level].name}!`;
      speak(msg);
      const w = checkWin(p);
      if (w) { setPlayers([...p]); setWinner(w); speak(`${w.name} voitti!`); setTimeout(() => setScreen("win"), 1800); return; }
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setOverlay({type:"levelup", playerName:p[cpIdx].name, levelName:LEVELS[p[cpIdx].level].name, emoji:LEVELS[p[cpIdx].level].emoji});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2500);

    } else if (effect === "swap_leader") {
      // Find player with highest level ahead
      let leader = -1, maxLv = -1;
      p.forEach((pl, i) => { if (i !== cpIdx && pl.level > maxLv) { maxLv = pl.level; leader = i; }});
      if (leader >= 0 && p[leader].level > p[cpIdx].level) {
        const tmp = p[cpIdx].level;
        p[cpIdx] = {...p[cpIdx], level: p[leader].level};
        p[leader] = {...p[leader], level: tmp};
        msg = `📞 ${p[cpIdx].name} ja ${p[leader].name} vaihtavat tasot!`;
      } else {
        msg = `📞 Exä soitti mutta ketään ei ollut edellä!`;
      }
      speak(msg);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setDecisionMade("accept");
      setTimeout(() => advanceTurn([...p]), 2000);

    } else if (effect === "all_down") {
      p = p.map(pl => ({...pl, level: Math.max(0, pl.level - 1)}));
      msg = `💸 Hääbudjetti! Kaikki tippuvat yhden tason!`;
      speak(msg);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setOverlay({type:"alldown"});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2200);

    } else if (effect === "all_up") {
      p = p.map(pl => ({...pl, level: Math.min(LEVELS.length - 2, pl.level + 1)}));
      msg = `🌹 Rakkauden aalto! Kaikki nousevat yhden tason!`;
      speak(msg);
      const w = checkWin(p);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      if (w) { setWinner(w); setTimeout(() => setScreen("win"), 1800); return; }
      setOverlay({type:"allup"});
      setTimeout(() => { setOverlay(null); advanceTurn([...p]); }, 2200);

    } else if (effect === "choose_victim") {
      msg = `👀 Katseet kohtaavat! ${p[cpIdx].name} valitsee uhrin!`;
      speak(`${p[cpIdx].name}, valitse kenen treffit menevät pieleen!`);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setDecisionMade("accept");
      setChooseVictim(true);

    } else if (effect === "skip_next") {
      const ni = (cpIdx + 1) % playerCount;
      p[ni] = {...p[ni], skipped: true};
      msg = `🃏 Treffikatastrofi! ${p[ni].name} menettää seuraavan vuoronsa!`;
      speak(msg);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setDecisionMade("accept");
      setTimeout(() => advanceTurn([...p]), 1500);

    } else if (effect === "family_now") {
      msg = `🍼 Yllätysraskaus! Sukukortti tulee heti!`;
      speak(msg);
      setPlayers([...p]); setLog(prev => [msg, ...prev].slice(0,10));
      setPendingFamilyCard(true);
      setDecisionMade("accept");
      setTimeout(() => { setCurrentCard(null); setDecisionMade(null); }, 1800);
    }
  }

  function makeDecision(accept) {
    if (!currentCard || decisionMade) return;
    const p = [...players];

    if (currentCard.cardType === "surprise") {
      setDecisionMade("accept");
      applySurprise(currentCard, p, currentPlayer);
      return;
    }

    applyNormalDecision(accept, currentCard, p, currentPlayer);
  }

  function pickVictim(victimIdx) {
    const p = [...players];
    p[victimIdx] = {...p[victimIdx], level: 0};
    speak(`${p[victimIdx].name} palaa alkuun!`);
    setPlayers(p);
    setChooseVictim(false);
    setOverlay({type:"reset", playerName:p[victimIdx].name});
    setTimeout(() => { setOverlay(null); advanceTurn(p); }, 2000);
  }

  const cp    = players[currentPlayer] || {};
  const level = cp.level !== undefined ? LEVELS[cp.level] : LEVELS[0];

  // ── SETUP ────────────────────────────────────────────────────────────────────
  if (screen === "setup") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",padding:"20px 20px 40px"}}>
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"36px",maxWidth:"440px",width:"100%",textAlign:"center",margin:"0 auto",marginTop:"max(20px, 5vh)"}}>
        <div style={{fontSize:"60px",marginBottom:"4px"}}>💘</div>
        <h1 style={{color:"#FF6B6B",fontSize:"42px",fontWeight:"900",margin:"0 0 2px",letterSpacing:"-2px"}}>TREFFI-PELI</h1>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:"12px",marginBottom:"28px"}}>Rakkaus on uhkapeliä. Oletko valmis?</p>
        <p style={{color:"rgba(255,255,255,0.6)",marginBottom:"10px",fontSize:"13px"}}>Pelaajien määrä</p>
        <div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"20px"}}>
          {[2,3,4].map(n => (
            <button key={n} onClick={() => setPlayerCount(n)} style={{width:"52px",height:"52px",borderRadius:"12px",border:playerCount===n?"2px solid #FF6B6B":"2px solid rgba(255,255,255,0.12)",background:playerCount===n?"rgba(255,107,107,0.18)":"transparent",color:playerCount===n?"#FF6B6B":"rgba(255,255,255,0.35)",fontSize:"20px",fontWeight:"bold",transition:"all 0.2s"}}>{n}</button>
          ))}
        </div>
        <div style={{marginBottom:"24px"}}>
          {Array.from({length:playerCount},(_,i) => (
            <input key={i} value={playerNames[i]} onChange={e=>{const n=[...playerNames];n[i]=e.target.value;setPlayerNames(n);}}
              placeholder={`Pelaaja ${i+1}`}
              style={{display:"block",width:"100%",marginBottom:"10px",padding:"12px 16px",borderRadius:"12px",border:`2px solid ${PLAYER_COLORS[i]}35`,background:"rgba(255,255,255,0.04)",color:PLAYER_COLORS[i],fontSize:"15px",outline:"none"}}
            />
          ))}
        </div>
        <button onClick={launchGame} style={{width:"100%",padding:"15px",borderRadius:"14px",background:"linear-gradient(135deg,#FF6B6B,#FF4500)",border:"none",color:"white",fontSize:"17px",fontWeight:"bold"}}>
          ALOITA PELI 💘
        </button>
        <div style={{marginTop:"18px",background:"rgba(255,255,255,0.03)",borderRadius:"12px",padding:"14px",textAlign:"left"}}>
          <p style={{color:"rgba(255,255,255,0.35)",fontSize:"11px",lineHeight:"2"}}>
            <strong style={{color:"rgba(255,255,255,0.55)"}}>Säännöt:</strong><br/>
            🃏 Nosta kortti — se kertoo kumppanisi ominaisuuden<br/>
            ✅ Hyväksy → etenette seuraavalle tasolle<br/>
            ❌ Hylkää → palataan takaisin alkuun<br/>
            💘 Tavoitteena kulkea suhteen polku alusta loppuun
          </p>
        </div>
        <div style={{marginTop:"14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"rgba(255,255,255,0.18)",fontSize:"10px"}}>v1.3</span>
          <button onClick={() => setScreen("credits")} style={{background:"transparent",border:"none",color:"rgba(255,107,107,0.55)",fontSize:"12px",cursor:"pointer",padding:"4px 8px",textDecoration:"underline",textDecorationColor:"rgba(255,107,107,0.3)"}}>
            Credits 💘
          </button>
        </div>
      </div>
    </div>
  );

  // ── CREDITS ──────────────────────────────────────────────────────────────────
  if (screen === "credits") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"40px",maxWidth:"400px",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:"48px",marginBottom:"12px"}}>💘</div>
        <h2 style={{color:"#FF6B6B",fontSize:"22px",fontWeight:"900",margin:"0 0 28px",letterSpacing:"-1px"}}>Credits</h2>
        <div style={{marginBottom:"24px"}}>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"10px"}}>Erityiset kiitokset</p>
          <p style={{color:"#F39C12",fontSize:"26px",fontWeight:"900",margin:"0",letterSpacing:"-1px"}}>Nella</p>
        </div>
        <div style={{width:"40px",height:"1px",background:"rgba(255,255,255,0.1)",margin:"0 auto 24px"}}/>
        <div style={{marginBottom:"32px"}}>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"12px"}}>Kiitokset</p>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {["Ari","Sonja","Marianna"].map(name => (
              <p key={name} style={{color:"rgba(255,255,255,0.65)",fontSize:"17px",fontWeight:"bold",margin:0}}>{name}</p>
            ))}
          </div>
        </div>
        <p style={{color:"rgba(255,255,255,0.15)",fontSize:"10px",marginBottom:"20px"}}>Treffi-peli v1.3</p>
        <button onClick={() => setScreen("setup")} style={{padding:"12px 32px",borderRadius:"12px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.5)",fontSize:"14px",fontWeight:"bold",cursor:"pointer"}}>
          ← Takaisin
        </button>
      </div>
    </div>
  );

  // ── PREFERENCES ──────────────────────────────────────────────────────────────
  if (screen === "preferences") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"36px",maxWidth:"440px",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:"52px",marginBottom:"8px"}}>💭</div>
        <h2 style={{color:"#FF6B6B",fontSize:"24px",fontWeight:"900",margin:"0 0 6px",letterSpacing:"-1px"}}>Unelmakumppani</h2>
        <p style={{color:"rgba(255,255,255,0.45)",fontSize:"12px",marginBottom:"24px"}}>Mitä etsit kumppanilta? Voit myös ohittaa tämän.</p>
        <div style={{marginBottom:"24px",textAlign:"left"}}>
          {players.map((p, i) => (
            <div key={i} style={{marginBottom:"12px"}}>
              <label style={{color:p.color,fontSize:"12px",fontWeight:"bold",display:"block",marginBottom:"5px"}}>{p.name}</label>
              <input
                value={partnerPrefs[i] || ""}
                onChange={e => { const n=[...partnerPrefs]; n[i]=e.target.value; setPartnerPrefs(n); }}
                placeholder="Etsin kumppania joka..."
                style={{display:"block",width:"100%",padding:"10px 14px",borderRadius:"10px",border:`2px solid ${p.color}40`,background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.8)",fontSize:"14px",outline:"none"}}
              />
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={() => startGame()} style={{flex:1,padding:"13px",borderRadius:"12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.5)",fontSize:"14px",fontWeight:"bold"}}>
            Ohita
          </button>
          <button onClick={() => startGame()} style={{flex:2,padding:"13px",borderRadius:"12px",background:"linear-gradient(135deg,#FF6B6B,#FF4500)",border:"none",color:"white",fontSize:"15px",fontWeight:"bold"}}>
            Aloita peli 💘
          </button>
        </div>
      </div>
    </div>
  );

  // ── WIN ──────────────────────────────────────────────────────────────────────
  if (screen === "win") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f9c74f,#f8961e,#f3722c)",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"20px"}}>
      <div>
        <div style={{fontSize:"80px",marginBottom:"12px"}}>👨‍👩‍👧‍👦</div>
        <h1 style={{color:"white",fontSize:"52px",margin:"0 0 6px",fontWeight:"900",letterSpacing:"-2px"}}>{winner?.name}</h1>
        <h2 style={{color:"rgba(255,255,255,0.88)",fontSize:"20px",fontWeight:"normal",margin:"0 0 28px"}}>perusti perheen! 🎉</h2>
        <button onClick={goToSetup} style={{padding:"15px 44px",borderRadius:"14px",background:"white",border:"none",color:"#f3722c",fontSize:"18px",fontWeight:"bold"}}>
          PELAA UUDELLEEN 🔄
        </button>
      </div>
    </div>
  );

  // ── GAME ─────────────────────────────────────────────────────────────────────
  const cfg = currentCard ? (TYPE_CONFIG[currentCard.cardType === "surprise" ? "surprise" : currentCard.cardType === "family" ? "family" : currentCard.type] || TYPE_CONFIG.neutral) : null;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#1a1a2e,#16213e)",padding:"14px",position:"relative"}}>

      {/* OVERLAYS */}
      {overlay && (
        <div style={{position:"fixed",inset:0,background:overlay.type==="reset"?"rgba(100,0,0,0.92)":overlay.type==="alldown"?"rgba(80,40,0,0.92)":"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,textAlign:"center",padding:"20px"}}>
          {overlay.type==="levelup" && <div>
            <div style={{fontSize:"72px",marginBottom:"12px"}}>{overlay.emoji}</div>
            <h2 style={{color:"#F39C12",fontSize:"30px",margin:"0 0 6px",fontWeight:"900"}}>TASON NOUSU!</h2>
            <p style={{color:"white",fontSize:"20px",margin:"0 0 4px"}}>{overlay.playerName}</p>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:"15px"}}>→ {overlay.levelName}</p>
          </div>}
          {overlay.type==="reset" && <div>
            <div style={{fontSize:"72px",marginBottom:"12px"}}>💔</div>
            <h2 style={{color:"#FF6B6B",fontSize:"28px",margin:"0 0 8px",fontWeight:"900"}}>PALATAAN ALKUUN!</h2>
            <p style={{color:"white",fontSize:"16px"}}>{overlay.playerName}</p>
          </div>}
          {overlay.type==="alldown" && <div>
            <div style={{fontSize:"72px",marginBottom:"12px"}}>💸</div>
            <h2 style={{color:"#F39C12",fontSize:"28px",margin:"0 0 8px",fontWeight:"900"}}>HÄÄBUDJETTI YLITTYI!</h2>
            <p style={{color:"white",fontSize:"15px"}}>Kaikki tippuvat yhden tason!</p>
          </div>}
          {overlay.type==="allup" && <div>
            <div style={{fontSize:"72px",marginBottom:"12px"}}>🌹</div>
            <h2 style={{color:"#27AE60",fontSize:"28px",margin:"0 0 8px",fontWeight:"900"}}>RAKKAUDEN AALTO!</h2>
            <p style={{color:"white",fontSize:"15px"}}>Kaikki nousevat yhden tason!</p>
          </div>}
          {overlay.type==="familydown" && <div>
            <div style={{fontSize:"72px",marginBottom:"12px"}}>👨‍👩‍👧</div>
            <h2 style={{color:"#e67e22",fontSize:"28px",margin:"0 0 8px",fontWeight:"900"}}>SUKU HYLÄTTY!</h2>
            <p style={{color:"white",fontSize:"16px"}}>{overlay.playerName}</p>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:"13px",marginTop:"6px"}}>→ {overlay.levelName}</p>
          </div>}
        </div>
      )}

      {/* CHOOSE VICTIM */}
      {chooseVictim && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,textAlign:"center",padding:"20px"}}>
          <div style={{maxWidth:"360px",width:"100%"}}>
            <div style={{fontSize:"56px",marginBottom:"12px"}}>👀</div>
            <h2 style={{color:"white",fontSize:"20px",margin:"0 0 20px",fontWeight:"900"}}>Kenen treffit menevät pieleen?</h2>
            {players.map((p,i) => i !== currentPlayer && (
              <button key={i} onClick={() => pickVictim(i)} style={{display:"block",width:"100%",padding:"14px",marginBottom:"10px",borderRadius:"12px",background:`${p.color}22`,border:`2px solid ${p.color}`,color:p.color,fontSize:"16px",fontWeight:"bold"}}>
                {p.name} — {LEVELS[p.level].emoji} {LEVELS[p.level].name}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <h2 style={{color:"#FF6B6B",margin:0,fontSize:"18px",fontWeight:"900"}}>💘 TREFFI-PELI</h2>
        <button onClick={goToSetup} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.35)",padding:"5px 10px",borderRadius:"8px",fontSize:"11px"}}>← Menu</button>
      </div>

      {/* PLAYERS */}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${playerCount},1fr)`,gap:"6px",marginBottom:"14px"}}>
        {players.map((p,i) => (
          <div key={i} style={{background:i===currentPlayer?`${p.color}15`:"rgba(255,255,255,0.02)",border:`2px solid ${i===currentPlayer?p.color:"rgba(255,255,255,0.05)"}`,borderRadius:"10px",padding:"8px",transition:"all 0.3s"}}>
            <div style={{color:p.color,fontWeight:"bold",fontSize:"11px",marginBottom:"2px"}}>{i===currentPlayer?"▶ ":""}{p.name}{p.skipped?" 💤":""}</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:"9px",marginBottom:"4px"}}>{LEVELS[p.level].emoji} {LEVELS[p.level].name}</div>
            <div style={{display:"flex",gap:"2px"}}>
              {LEVELS.map((_,li) => (
                <div key={li} style={{flex:1,height:"4px",borderRadius:"2px",background:li<=p.level?"":li===p.level+1?`${p.color}40`:"rgba(255,255,255,0.06)",backgroundColor:li<=p.level?p.color:undefined}}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* CURRENT PLAYER */}
      <div style={{background:`${cp.color}10`,border:`1px solid ${cp.color}30`,borderRadius:"12px",padding:"11px",marginBottom:"13px",textAlign:"center"}}>
        <p style={{color:cp.color,margin:0,fontSize:"13px",fontWeight:"bold"}}>{cp.name} — sinun vuorosi</p>
        <p style={{color:"rgba(255,255,255,0.45)",margin:"3px 0 0",fontSize:"11px"}}>{level.emoji} {level.name}: {level.desc}</p>
        {partnerPrefs[currentPlayer] && (
          <p style={{color:"rgba(255,255,255,0.28)",margin:"5px 0 0",fontSize:"10px",fontStyle:"italic"}}>💭 "{partnerPrefs[currentPlayer]}"</p>
        )}
      </div>

      {/* CARD */}
      {!currentCard ? (
        <div onClick={drawCard} style={{background:"rgba(255,255,255,0.03)",border:"2px dashed rgba(255,255,255,0.12)",borderRadius:"18px",padding:"44px 20px",textAlign:"center",cursor:"pointer",marginBottom:"14px"}}>
          <div style={{fontSize:"52px",marginBottom:"10px"}}>🃏</div>
          <p style={{color:"rgba(255,255,255,0.6)",margin:0,fontSize:"16px",fontWeight:"bold"}}>Nosta kortti</p>
          <p style={{color:"rgba(255,255,255,0.28)",margin:"4px 0 0",fontSize:"12px"}}>
            {pendingFamilyCard ? "👨‍👩‍👧 Sukukortti odottaa!" : "Saat treffattavasi ominaisuuden"}
          </p>
        </div>
      ) : (
        <div style={{borderRadius:"18px",marginBottom:"13px",overflow:"hidden",border:`2px solid ${cfg.border}`,boxShadow:`0 8px 28px ${cfg.border}25`}}>
          <div style={{background:cfg.bg,padding:"22px 20px",textAlign:"center"}}>
            <div style={{fontSize:"52px",marginBottom:"10px"}}>{currentCard.emoji}</div>
            {currentCard.cardType === "family" && (
              <div style={{color:cfg.border,fontSize:"13px",fontWeight:"bold",marginBottom:"6px"}}>
                {currentCard.role}
              </div>
            )}
            <p style={{color:"#1a1a2e",fontSize:"18px",fontWeight:"bold",margin:0,lineHeight:"1.4"}}>{currentCard.text}</p>
          </div>

          {currentCard.cardType === "surprise" ? (
            !decisionMade ? (
              <button onClick={() => makeDecision(true)} style={{width:"100%",padding:"16px",background:cfg.border,border:"none",color:"white",fontSize:"16px",fontWeight:"bold"}}>
                🎲 OK — sovellaan!
              </button>
            ) : (
              <div style={{padding:"16px",background:cfg.border,textAlign:"center",color:"white",fontWeight:"bold",fontSize:"15px"}}>
                {currentCard.effect === "family_now" ? "🍼 Sukukortti tulossa..." : "🎲 Käänne sovellettu!"}
              </div>
            )
          ) : !decisionMade ? (
            <div style={{display:"flex"}}>
              <button onClick={() => makeDecision(true)}  style={{flex:1,padding:"16px",background:"#28a745",border:"none",color:"white",fontSize:"16px",fontWeight:"bold",borderBottomLeftRadius:"16px"}}>✅ Hyväksyn</button>
              <button onClick={() => makeDecision(false)} style={{flex:1,padding:"16px",background:"#dc3545",border:"none",color:"white",fontSize:"16px",fontWeight:"bold",borderBottomRightRadius:"16px"}}>❌ Hylkään</button>
            </div>
          ) : (
            <div style={{padding:"16px",background:decisionMade==="accept"?"#28a745":"#dc3545",textAlign:"center",color:"white",fontWeight:"bold",fontSize:"16px"}}>
              {decisionMade==="accept"?"✅ Hyväksytty!":"❌ Hylätty!"}
            </div>
          )}
        </div>
      )}

      {/* LOG */}
      {log.length > 0 && (
        <div style={{background:"rgba(255,255,255,0.02)",borderRadius:"10px",padding:"10px",maxHeight:"100px",overflowY:"auto"}}>
          {log.map((entry,i) => (
            <p key={i} style={{color:i===0?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.22)",fontSize:"11px",margin:"0 0 3px",lineHeight:"1.4"}}>{entry}</p>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
